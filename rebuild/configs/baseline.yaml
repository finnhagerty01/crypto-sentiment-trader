data:
  symbol: BTCUSDT
  interval: 1h

features:
  enabled_groups:
    - baseline
  volatility_window: 24
  volume_window: 24
  rsi_window: 14
  clipping_window: 168
  clipping_mad_multiplier: 8.0

target:
  horizon_bars: 1
  cost_buffer: round_trip
  volatility_multiplier: 0.10

model:
  probability_threshold: 0.55
  regularization_c: 1.0

validation:
  minimum_train_bars: 1000
  test_bars: 168
  step_bars: 168
  final_holdout_fraction: 0.20

costs:
  fee_per_side: 0.001
  slippage_per_side: 0.0005

backtest:
  initial_capital: 10000.0
